version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - TZ=Asia/Bangkok
      - MYSQL_HOST=mysql
    depends_on:
      mysql:
        condition: service_healthy

  main:
    build:
      context: .
      dockerfile: Dockerfile.main
    restart: always
    env_file:
      - .env
    environment:
      - TZ=Asia/Bangkok
      - MYSQL_HOST=mysql
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    build:
      context: .
      dockerfile: Dockerfile.mysql
    restart: always
    environment:
      TZ: Asia/Bangkok
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: users_db
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-ppassword"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    restart: always
    ports:
      - "8080:80"
    environment:
      TZ: Asia/Bangkok
      PMA_HOST: mysql
      MYSQL_ROOT_PASSWORD: password
